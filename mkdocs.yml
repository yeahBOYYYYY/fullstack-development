site_name: FullStack Development
repo_url: https://github.com/yeahBOYYYYY/fullstack-development/
repo_name: yeahBOYYYYY/fullstack-development
site_description: A documentation site for FullStack development for beginners.
site_author: Ron Mikhelman
site_url: https://yeahBOYYYYY.github.io/fullstack-development/
copyright: Copyright &copy; 2026 Ron Mikhelman

markdown_extensions:
  - toc:
      permalink: "🔗"
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - pymdownx.blocks.caption

theme:
  name: material
  language: en
  favicon: assets/favicon.ico
  logo: assets/favicon.ico

  icon:
    repo: fontawesome/brands/github
  
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-3
        name: Switch to system preference

  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.prune
    - navigation.indexes
    # - navigation.instant
    - toc.follow
    # - toc.integrate
    - navigation.top
    - search.suggest
    - search.share
    - header.autohide

plugins:
  - search
  - git-authors
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
  - glightbox:
      auto_themed: true
      auto_caption: true
      caption_position: bottom

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeahBOYYYYY
      name: GitHub

nav:
  - Home: index.md
  - Front-End:
    - Front-End/index.md
    - HTML:
      - Front-End/HTML/index.md
    - CSS:
      - Front-End/CSS/index.md
    - JavaScript:
      - Front-End/JavaScript/index.md
    - Tailwind CSS:
      - Front-End/TailwindCSS/index.md
  - Back-End:
    - Back-End/index.md
  - NPM:
    - NPM/index.md
    - NPM/package.json.md
    - NPM/NPX.md
